<style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .match-card { box-shadow: 0px 4px 20px rgba(73, 94, 138, 0.05); }
        
        @keyframes tap-scale {
            0% { transform: scale(1); }
            50% { transform: scale(0.95); }
            100% { transform: scale(1); }
        }
        .animate-tap {
            animation: tap-scale 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes spinner {
            to {transform: rotate(360deg);}
        }
        .animate-spinner {
            animation: spinner 0.8s linear infinite;
        }
        
        select optgroup {
            font-weight: 700;
            color: #006e2a;
            background-color: #f2f4f6;
        }
        select option {
            font-weight: 400;
            color: #191c1e;
            background-color: #ffffff;
            padding: 8px;
        }

        .scroll-hide::-webkit-scrollbar {
            display: none;
        }
        .scroll-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        body {
            min-height: max(884px, 100dvh);
            background-image: radial-gradient(circle at 2px 2px, rgba(0, 110, 42, 0.03) 1px, transparent 0);
            background-size: 24px 24px;
        }

        .flag-icon {
            width: 20px;
            height: 14px;

            border-radius: 2px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);

        .flag-icon-large {
            width: 32px;
            height: 22px;

            border-radius: 4px;

        function getFlagUrl(code) {
            return `https://flagcdn.com/w80/${code}.png`;
        }

        function renderStandings() {
            const container = document.getElementById('groups-container');
            container.innerHTML = groupsData.map(group => `
                <div class="bg-surface-container-lowest rounded-xl overflow-hidden border border-outline-variant shadow-sm">
                    <div class="bg-primary-container/10 px-md py-2 border-b border-outline-variant flex justify-between items-center">
                        <h3 class="font-headline-md text-primary text-[18px]">${group.name}</h3>
                        <span class="text-label-sm text-outline">World Cup 2026</span>
                    </div>
                    <div class="overflow-x-auto scroll-hide">
                        <table class="w-full text-left text-label-sm">
                            <thead>
                                <tr class="bg-background text-outline uppercase tracking-wider text-[10px]">
                                    <th class="px-4 py-2 font-bold w-10">Pos</th>
                                    <th class="px-2 py-2 font-bold">Team</th>
                                    <th class="px-2 py-2 font-bold text-center">GP</th>
                                    <th class="px-2 py-2 font-bold text-center">W</th>
                                    <th class="px-2 py-2 font-bold text-center">D</th>
                                    <th class="px-2 py-2 font-bold text-center">L</th>
                                    <th class="px-2 py-2 font-bold text-center">GD</th>
                                    <th class="px-4 py-2 font-bold text-center">Pts</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-outline-variant/30">
                                ${group.teams.map((team, idx) => `
                                    <tr class="hover:bg-surface-container-low transition-colors">
                                        <td class="px-4 py-3 font-semibold text-outline text-center">${idx + 1}</td>
                                        <td class="px-2 py-3">
                                            <div class="flex items-center gap-2">
                                                <img src="${getFlagUrl(team.code)}" alt="${team.name} flag" class="flag-icon">
                                                <span class="font-semibold text-on-surface truncate max-w-[180px]">${team.name}</span>
                                            </div>
                                        </td>
                                        <td class="px-2 py-3 text-center text-on-surface">${team.gp}</td>
                                        <td class="px-2 py-3 text-center text-on-surface">${team.w}</td>
                                        <td class="px-2 py-3 text-center text-on-surface">${team.d}</td>
                                        <td class="px-2 py-3 text-center text-on-surface">${team.l}</td>
                                        <td class="px-2 py-3 text-center text-on-surface">${team.gd > 0 ? '+' + team.gd : team.gd}</td>
                                        <td class="px-4 py-3 text-center font-bold text-primary">${team.pts}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `).join('');
        }

        function populatePredictorDropdowns() {
            const homeSelect = document.getElementById('home-team');
            const awaySelect = document.getElementById('away-team');
            
            let optionsHtml = '<option value="" data-code="">Select Team</option>';
            groupsData.forEach(group => {
                optionsHtml += `<optgroup label="${group.name}">`;
                group.teams.forEach(team => {
                    const teamId = team.name.toLowerCase().replace(/\s+/g, '_');
                    optionsHtml += `<option value="${teamId}" data-code="${team.code}">${team.name}</option>`;
                });
                optionsHtml += `</optgroup>`;
            });

            homeSelect.innerHTML = optionsHtml;
            awaySelect.innerHTML = optionsHtml;
        }

        function updateSelectedFlag(side) {
            const select = document.getElementById(`${side}-team`);
            const flagContainer = document.getElementById(`${side}-flag-container`);
            const flagImg = document.getElementById(`${side}-flag-img`);
            
            const selectedOption = select.options[select.selectedIndex];
            const countryCode = selectedOption.getAttribute('data-code');

            if (countryCode && countryCode !== "") {
                flagImg.src = getFlagUrl(countryCode);
                flagContainer.classList.remove('hidden');
                select.classList.add('pl-12');
            } else {
                flagContainer.classList.add('hidden');
                select.classList.remove('pl-12');
            }
        }

        function switchTab(tab) {
            const predictorSec = document.getElementById('section-predictor');
            const standingsSec = document.getElementById('section-standings');
            const tabPredictor = document.getElementById('tab-predictor');
            const tabStandings = document.getElementById('tab-standings');
            const navPredict = document.getElementById('nav-predict');
            const navStandings = document.getElementById('nav-standings');

            if (tab === 'predictor') {
                predictorSec.classList.remove('hidden');
                standingsSec.classList.add('hidden');
                
                tabPredictor.classList.add('bg-primary', 'text-on-primary');
                tabPredictor.classList.remove('text-outline');
                tabStandings.classList.remove('bg-primary', 'text-on-primary');
                tabStandings.classList.add('text-outline');

                navPredict.classList.add('bg-primary-container', 'text-on-primary-container', 'rounded-full');
                navPredict.classList.remove('text-outline');
                navStandings.classList.remove('bg-primary-container', 'text-on-primary-container', 'rounded-full');
                navStandings.classList.add('text-outline');
            } else {
                predictorSec.classList.add('hidden');
                standingsSec.classList.remove('hidden');

                tabStandings.classList.add('bg-primary', 'text-on-primary');
                tabStandings.classList.remove('text-outline');
                tabPredictor.classList.remove('bg-primary', 'text-on-primary');
                tabPredictor.classList.add('text-outline');

                navStandings.classList.add('bg-primary-container', 'text-on-primary-container', 'rounded-full');
                navStandings.classList.remove('text-outline');
                navPredict.classList.remove('bg-primary-container', 'text-on-primary-container', 'rounded-full');
                navPredict.classList.add('text-outline');
                
                renderStandings();
            }
        }

        function handlePredict(btn) {
            const hSelect = document.getElementById('home-team');
            const aSelect = document.getElementById('away-team');
            const h = hSelect.value;
            const a = aSelect.value;
            const err = document.getElementById('error-msg');
            const errText = document.getElementById('error-text');
            const btnText = document.getElementById('btn-text');
            const btnSpinner = document.getElementById('btn-spinner');
            
            btn.classList.remove('animate-tap');
            void btn.offsetWidth; 
            btn.classList.add('animate-tap');

            if (!h || !a) {
                errText.textContent = "Please select both teams.";
                err.classList.remove('hidden');
                return;
            }

            if (h === a) {
                errText.textContent = "Please select two different teams.";
                err.classList.remove('hidden');
                return;
            }
            
            err.classList.add('hidden');
            
            btn.disabled = true;
            btnSpinner.classList.remove('hidden');
            btnText.textContent = "Analyzing Tactics...";

            const homeName = hSelect.options[hSelect.selectedIndex].text;
            const awayName = aSelect.options[aSelect.selectedIndex].text;

            fetch('https://fifa-world-cup-2026-predicator.onrender.com', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ home_team: homeName, away_team: awayName })
            })
            .then(response => response.json())
            .then(data => {
                btn.disabled = false;
                btnSpinner.classList.add('hidden');
                btnText.textContent = "Predict Match";

                if (data.status === 'success') {
                    alert(`Prediction: ${data.match}\nWinner: ${data.predicted_winner}`);
                } else {
                    errText.textContent = 'Server error: could not get prediction.';
                    err.classList.remove('hidden');
                }
            })
            .catch(() => {
                btn.disabled = false;
                btnSpinner.classList.add('hidden');
                btnText.textContent = "Predict Match";
                errText.textContent = 'Unable to reach the prediction API.';
                err.classList.remove('hidden');
            });
        }

        function handleReset() {
            document.getElementById('home-team').value = "";
            document.getElementById('away-team').value = "";
            document.getElementById('error-msg').classList.add('hidden');
            updateSelectedFlag('home');
            updateSelectedFlag('away');
        }

        window.onload = () => {
            populatePredictorDropdowns();
            renderStandings();
        }
    </script>
</body></html>
